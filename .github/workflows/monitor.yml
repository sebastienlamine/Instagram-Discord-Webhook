name: Instagram Monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub minimum is 5min but 15min is safer)
  workflow_dispatch:           # allow manual trigger from the Actions tab

permissions:
  contents: write              # needed to commit state.txt back to the repo

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Restore the Instagram session between runs to avoid repeated logins
      - name: Restore Instagram session cache
        uses: actions/cache@v4
        with:
          path: ig_session.json
          key: ig-session-${{ runner.os }}
          restore-keys: ig-session-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install instagrapi requests

      - name: Run monitor
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_TARGET:   ${{ secrets.IG_TARGET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python instagram-discord.py

      # Commit state.txt so the next run knows the last post seen
      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.txt
          git diff --cached --quiet || git commit -m "chore: update last post state [skip ci]"
          git push
