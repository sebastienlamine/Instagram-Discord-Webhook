name: Instagram Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          IG_TARGET:   ${{ secrets.IG_TARGET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python instagram-discord.py

      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.txt
          git diff --cached --quiet || git commit -m "chore: update last post state [skip ci]"
          git push
